<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-grouped); font-family: var(--font-sans); color: var(--text-primary); }
  .wrap { padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .lbl { font: 600 11px/1 var(--font-sans); letter-spacing: .4px; text-transform: uppercase; color: var(--text-secondary); width: 100%; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>document.write('<scr'+'ipt src="../../../_ds_bundle.js?v='+Date.now()+'"><\/scr'+'ipt>');</script>
<script type="text/babel">
  const { Button, Switch, SegmentedControl, Stepper } = window.LIMEDesignSystem_6ca3c0;
  function Demo() {
    const [on1, setOn1] = React.useState(true);
    const [on2, setOn2] = React.useState(false);
    const [seg, setSeg] = React.useState("繁轉簡");
    const [score, setScore] = React.useState(5);
    return (
      <>
        <div className="row">
          <span className="lbl">Button</span>
          <Button variant="prominent" size="large">前往設定</Button>
          <Button variant="bordered">選用萊姆輸入法</Button>
          <Button variant="plain">取消</Button>
          <Button destructive>移除輸入法</Button>
          <Button variant="prominent" disabled>停用</Button>
        </div>
        <div className="row">
          <span className="lbl">Switch · SegmentedControl · Stepper</span>
          <Switch checked={on1} onChange={setOn1} />
          <Switch checked={on2} onChange={setOn2} />
          <Switch checked={true} disabled onChange={()=>{}} />
          <SegmentedControl options={["無","繁轉簡","簡轉繁"]} value={seg} onChange={setSeg} />
          <Stepper value={score} onChange={setScore} />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
