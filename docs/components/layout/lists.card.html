<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--bg-grouped); font-family: var(--font-sans); }
  .wrap { padding: 24px; max-width: 480px; display: flex; flex-direction: column; gap: 22px; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>document.write('<scr'+'ipt src="../../_ds_bundle.js?v='+Date.now()+'"><\/scr'+'ipt>');</script>
<script type="text/babel">
  const { ListGroup, ListRow, Switch } = window.LIMEDesignSystem_6ca3c0;
  const I = (d) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>;
  function Demo() {
    const [a, setA] = React.useState(true);
    const [b, setB] = React.useState(false);
    return (
      <>
        <ListGroup header="鍵盤外觀" footer="鍵盤樣式套用至所有輸入法。">
          <ListRow icon={I(<rect x="3" y="6" width="18" height="12" rx="2"/>)} iconColor="var(--green-strong)" title="鍵盤樣式" value="放鬆綠" chevron />
          <ListRow title="字型大小" value="一般" chevron />
          <ListRow title="打字震動" trailing={<Switch checked={a} onChange={setA} />} />
          <ListRow title="打字音效" trailing={<Switch checked={b} onChange={setB} />} />
        </ListGroup>
        <ListGroup header="已安裝的輸入法">
          <ListRow title="注音" subtitle="34,838 筆" trailing={<Switch checked onChange={()=>{}} />} />
          <ListRow title="倉頡" subtitle="停用中" style={{opacity:.5}} trailing={<Switch checked={false} onChange={()=>{}} />} />
          <ListRow title="移除輸入法" destructive />
        </ListGroup>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
