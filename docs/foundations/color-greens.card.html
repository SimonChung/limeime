<!-- @dsCard group="Colors" viewport="700x170" name="Brand Greens" subtitle="The LIME green ramp — accents, switches, deep ink" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:0}
  .sw{height:170px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
  .sw span{font:600 12px/1.4 var(--font-sans)}
  .sw small{font:500 11px/1.5 var(--font-mono);opacity:.85}
  .dark{color:#fff}.lite{color:var(--green-ink)}
</style></head>
<body>
<div class="grid">
  <div class="sw lite" style="background:var(--lime-bright)"><span>lime-bright</span><small>#B2D234</small></div>
  <div class="sw lite" style="background:var(--lime)"><span>lime</span><small>#7BC143</small></div>
  <div class="sw dark" style="background:var(--lime-green)"><span>lime-green</span><small>#4CAF50</small></div>
  <div class="sw dark" style="background:var(--green)"><span>green</span><small>#2E9E4B</small></div>
  <div class="sw dark" style="background:var(--green-strong)"><span>green-strong</span><small>#00833E</small></div>
  <div class="sw dark" style="background:var(--green-deep)"><span>green-deep</span><small>#00682F</small></div>
</div>
</body></html>
