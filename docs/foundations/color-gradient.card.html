<!-- @dsCard group="Colors" viewport="700x230" name="Brand Gradient" subtitle="The lime-fruit wordmark gradient — bright lime → deep green" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;font-family:var(--font-sans)}
  .hero{height:230px;display:flex;align-items:flex-end;background:var(--brand-gradient);padding:20px;box-sizing:border-box}
  .stops{display:flex;gap:0;width:100%;border-radius:8px;overflow:hidden}
  .stop{flex:1;padding:8px 10px;font:600 11px/1.5 var(--font-sans);color:#fff;background:rgba(0,0,0,.18)}
  .stop b{display:block;font-size:12px}
</style></head>
<body>
<div class="hero">
  <div class="stops">
    <div class="stop"><b>lime-bright</b>#B2D234</div>
    <div class="stop"><b>lime</b>#8DC63F</div>
    <div class="stop"><b>green</b>#39B54A</div>
    <div class="stop"><b>green-deep</b>#00833E</div>
  </div>
</div>
</body></html>
