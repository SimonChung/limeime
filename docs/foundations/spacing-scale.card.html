<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="The pt values SettingsMetrics actually uses" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg)}
  .wrap{padding:22px;display:flex;flex-direction:column;gap:10px}
  .row{display:flex;align-items:center;gap:14px}
  .bar{height:16px;background:var(--green-strong);border-radius:3px}
  .lbl{font:500 12px/1 var(--font-mono);color:var(--text-secondary);width:120px}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="lbl">--space-4</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="lbl">--space-8</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="lbl">--space-11 · row</span><div class="bar" style="width:11px"></div></div>
  <div class="row"><span class="lbl">--space-16 · section</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="lbl">--space-20 · title</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="lbl">--space-24 · page</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="lbl">--space-32 · hero</span><div class="bar" style="width:32px"></div></div>
</div>
</body></html>
